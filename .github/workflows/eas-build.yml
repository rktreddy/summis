name: EAS Build & Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: 'Submit to store after build'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build ${{ inputs.platform }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: eas build --platform ${{ inputs.platform }} --profile production --non-interactive

      - name: Submit to stores
        if: ${{ inputs.submit }}
        run: eas submit --platform ${{ inputs.platform }} --profile production --non-interactive
