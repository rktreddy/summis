<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; background: linear-gradient(135deg, #0A0A0F 0%, #1a1a2e 50%, #16213e 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  .container { text-align: center; color: white; }
  .title { font-size: 72px; font-weight: 800; letter-spacing: -2px; margin-bottom: 12px; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tagline { font-size: 28px; font-weight: 400; color: #94a3b8; letter-spacing: 0.5px; }
  .accent { color: #818cf8; font-weight: 600; }
</style>
</head>
<body>
  <div class="container">
    <div class="title">Summis</div>
    <div class="tagline">Science-backed focus sprints. <span class="accent">Prove what works.</span></div>
  </div>
</body>
</html>
