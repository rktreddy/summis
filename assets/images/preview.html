<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summis — Icon & Splash Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060608; color: #fff; font-family: -apple-system, 'Helvetica Neue', sans-serif; padding: 40px; }
  h1 { font-size: 14px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; color: #9CA3AF; margin-bottom: 48px; }
  .row { display: flex; gap: 60px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 60px; }
  .preview { text-align: center; }
  .preview label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #666; margin-bottom: 16px; }
  .icon-frame { border-radius: 22%; overflow: hidden; display: inline-block; }
  .icon-frame img, .icon-frame svg { display: block; }
  .splash-frame { width: 375px; height: 812px; background: #0A0A0F; border-radius: 40px; border: 2px solid #1E1E2E; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .splash-frame img { width: 280px; height: auto; }
  .android-frame { width: 108px; height: 108px; border-radius: 50%; background: #0A0A0F; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #1E1E2E; }
  .android-frame img { width: 76px; height: 76px; object-fit: contain; }
  .store-row { display: flex; gap: 24px; align-items: center; }
  .store-icon { width: 120px; height: 120px; border-radius: 27px; overflow: hidden; border: 1px solid #1E1E2E; }
  .store-icon img { width: 100%; height: 100%; }
  .store-icon-sm { width: 60px; height: 60px; border-radius: 13px; overflow: hidden; border: 1px solid #1E1E2E; }
  .store-icon-sm img { width: 100%; height: 100%; }
</style>
</head>
<body>
  <h1>Summis — Brand Assets Preview</h1>

  <div class="row">
    <div class="preview">
      <label>App Icon — 1024×1024 (App Store)</label>
      <div class="store-icon"><img src="icon.png" alt="App icon"></div>
    </div>
    <div class="preview">
      <label>Home Screen Size</label>
      <div class="store-icon-sm"><img src="icon.png" alt="App icon small"></div>
    </div>
    <div class="preview">
      <label>Android Adaptive (Circle)</label>
      <div class="android-frame"><img src="android-icon-foreground.png" alt="Android foreground"></div>
    </div>
    <div class="preview">
      <label>Favicon 48px</label>
      <img src="favicon.png" alt="Favicon" style="width:48px;height:48px;">
    </div>
  </div>

  <div class="row">
    <div class="preview">
      <label>Splash Screen — iPhone 14 Pro</label>
      <div class="splash-frame">
        <img src="splash-icon.png" alt="Splash screen">
      </div>
    </div>
    <div class="preview" style="max-width:400px; margin-top: 40px;">
      <label>SVG Source — Icon</label>
      <div class="icon-frame" style="width:200px;height:200px;background:#0A0A0F;border:1px solid #1E1E2E;">
        <img src="icon.svg" alt="Icon SVG" style="width:200px;height:200px;">
      </div>
      <br><br>
      <label>SVG Source — Splash Mark</label>
      <div style="width:300px;height:300px;background:#0A0A0F;border:1px solid #1E1E2E;border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <img src="splash-icon.svg" alt="Splash SVG" style="width:260px;height:260px;">
      </div>
    </div>
  </div>
</body>
</html>
