<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="sPeakGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5B3FD4"/>
      <stop offset="50%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#9B7FFF"/>
    </linearGradient>
    <radialGradient id="sSummitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#C4B5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <filter id="sDotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="sPeakBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Peak glow -->
  <polygon points="300,80 130,360 470,360" fill="#7C5CFC" opacity="0.1" filter="url(#sPeakBlur)"/>

  <!-- Main peak -->
  <polygon points="300,95 140,360 460,360" fill="url(#sPeakGrad)" opacity="0.85"/>

  <!-- Edge highlights -->
  <line x1="300" y1="95" x2="140" y2="360" stroke="#9B7FFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="95" x2="460" y2="360" stroke="#9B7FFF" stroke-width="1.5" opacity="0.3"/>

  <!-- Baseline -->
  <line x1="80" y1="360" x2="520" y2="360" stroke="#7C5CFC" stroke-width="2" opacity="0.3"/>

  <!-- Secondary peak -->
  <polygon points="448,260 400,360 496,360" fill="#7C5CFC" opacity="0.25"/>

  <!-- Summit glow -->
  <circle cx="300" cy="86" r="28" fill="url(#sSummitGlow)" filter="url(#sDotGlow)" opacity="0.5"/>

  <!-- Summit dot -->
  <circle cx="300" cy="92" r="8" fill="#FFFFFF" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="300" y="460" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue','Inter',sans-serif" font-size="56" font-weight="300" letter-spacing="14" fill="#FFFFFF" opacity="0.95">SUMMIS</text>

  <!-- Tagline -->
  <text x="300" y="500" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue','Inter',sans-serif" font-size="15" font-weight="400" letter-spacing="4" fill="#9CA3AF" opacity="0.7">COGNITIVE PERFORMANCE</text>
</svg>
