<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="sPeakGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#4A2FB0"/>
      <stop offset="60%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="sSummitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#C4B5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sAmbientGlow" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <filter id="sDotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="260" rx="200" ry="170" fill="url(#sAmbientGlow)"/>

  <!-- Main peak -->
  <polygon points="300,90 140,360 460,360" fill="url(#sPeakGrad)" opacity="0.9"/>

  <!-- Left edge highlight -->
  <line x1="300" y1="90" x2="140" y2="360" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>

  <!-- Baseline -->
  <line x1="100" y1="360" x2="500" y2="360" stroke="#7C5CFC" stroke-width="1.5" opacity="0.25"/>

  <!-- Summit glow -->
  <circle cx="300" cy="84" r="30" fill="url(#sSummitGlow)" filter="url(#sDotGlow)" opacity="0.7"/>

  <!-- Summit dot -->
  <circle cx="300" cy="88" r="7" fill="#FFFFFF" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="300" y="455" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue','Inter',sans-serif" font-size="52" font-weight="300" letter-spacing="14" fill="#FFFFFF" opacity="0.9">SUMMIS</text>

  <!-- Tagline -->
  <text x="300" y="495" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue','Inter',sans-serif" font-size="14" font-weight="400" letter-spacing="4" fill="#9CA3AF" opacity="0.65">COGNITIVE PERFORMANCE</text>
</svg>
