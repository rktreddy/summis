<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - deeper, richer -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%" fx="50%" fy="35%">
      <stop offset="0%" stop-color="#161230"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>

    <!-- Peak gradient - refined purple -->
    <linearGradient id="peakGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#4A2FB0"/>
      <stop offset="60%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Summit glow -->
    <radialGradient id="summitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#C4B5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft ambient glow behind peak -->
    <radialGradient id="ambientGlow" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>

    <!-- Summit point glow filter -->
    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
    </filter>

    <!-- Soft peak edge glow -->
    <filter id="edgeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGlow)"/>

  <!-- Ambient glow behind peak -->
  <ellipse cx="512" cy="520" rx="340" ry="280" fill="url(#ambientGlow)"/>

  <!-- Main peak shape - clean single triangle -->
  <polygon
    points="512,270 330,720 694,720"
    fill="url(#peakGrad)"
    opacity="0.9"
  />

  <!-- Subtle left edge highlight -->
  <line x1="512" y1="270" x2="330" y2="720" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle baseline -->
  <line x1="280" y1="720" x2="744" y2="720" stroke="#7C5CFC" stroke-width="2" opacity="0.25"/>

  <!-- Summit outer glow -->
  <circle cx="512" cy="262" r="44" fill="url(#summitGlow)" filter="url(#dotGlow)" opacity="0.7"/>

  <!-- Summit dot - crisp white point -->
  <circle cx="512" cy="268" r="10" fill="#FFFFFF" opacity="0.95"/>
</svg>
