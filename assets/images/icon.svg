<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#1A1535"/>
      <stop offset="60%" stop-color="#0F0E1A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>

    <!-- Peak accent gradient -->
    <linearGradient id="peakGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5B3FD4"/>
      <stop offset="50%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#9B7FFF"/>
    </linearGradient>

    <!-- Summit glow -->
    <radialGradient id="summitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#C4B5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle outer glow on peak -->
    <filter id="peakBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <!-- Summit point glow -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGlow)"/>

  <!-- Subtle grid lines (scientific aesthetic) -->
  <g opacity="0.04" stroke="#7C5CFC" stroke-width="1">
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="500" x2="1024" y2="500"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="700" x2="1024" y2="700"/>
    <line x1="300" y1="200" x2="300" y2="800"/>
    <line x1="512" y1="200" x2="512" y2="800"/>
    <line x1="724" y1="200" x2="724" y2="800"/>
  </g>

  <!-- Performance trend line (subtle, behind peak) -->
  <polyline
    points="180,680 280,660 360,640 440,600 500,520 512,340 524,520 600,580 680,560 760,540 844,520"
    fill="none"
    stroke="#7C5CFC"
    stroke-width="2.5"
    stroke-opacity="0.15"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Peak glow (behind) -->
  <polygon
    points="512,260 340,700 684,700"
    fill="#7C5CFC"
    opacity="0.12"
    filter="url(#peakBlur)"
  />

  <!-- Main peak shape -->
  <polygon
    points="512,280 350,700 674,700"
    fill="url(#peakGrad)"
    opacity="0.85"
  />

  <!-- Peak edge highlights (left and right) -->
  <line x1="512" y1="280" x2="350" y2="700" stroke="#9B7FFF" stroke-width="2" opacity="0.5"/>
  <line x1="512" y1="280" x2="674" y2="700" stroke="#9B7FFF" stroke-width="2" opacity="0.3"/>

  <!-- Horizontal baseline -->
  <line x1="240" y1="700" x2="784" y2="700" stroke="#7C5CFC" stroke-width="2.5" opacity="0.35"/>

  <!-- Summit glow effect -->
  <circle cx="512" cy="270" r="40" fill="url(#summitGlow)" filter="url(#dotGlow)" opacity="0.6"/>

  <!-- Summit dot -->
  <circle cx="512" cy="278" r="12" fill="#FFFFFF" opacity="0.95"/>

  <!-- Small secondary peak (right, adds depth) -->
  <polygon
    points="680,520 620,700 740,700"
    fill="#7C5CFC"
    opacity="0.25"
  />
</svg>
